<body>

<div class="app-container">
  <canvas id="snow-canvas"></canvas>

  <div class="status-bar">
    <span>❄️ 9:41</span>
    <span>SNOW BLUE</span>
    <span>📱 100%</span>
  </div>

  <div class="content-card">
    <div class="snow-icon">❄️✨</div>
    <h1>နှင်းများကျဆဲ</h1>
    <p class="tagline">အပြာရောင် နောက်ခံလှလှလေး<br>နှင်းများ အေးအေးဆေးဆေး ကျနေပါတယ်</p>
    
    <div class="feature-badge">
      <span class="badge">❄️ နှင်း ၁၂၀+</span>
      <span class="badge">🌬️ လေညင်းညင်း</span>
      <span class="badge">💙 အပြာရောင်</span>
    </div>

    <div class="btn-group">
      <button class="btn" id="moreSnowBtn">❄️ နှင်းပိုကျစေ</button>
      <button class="btn btn-primary" id="greetingBtn">✨ နှုတ်ဆက်စကား</button>
    </div>
  </div>
  <div class="footer-hint">
    ✨ နှစ်ချက်နှိပ်ရင် နှင်းစေ့ထပ်တိုး | အေးမြသောဆောင်းရာသီခံစားမှု ✨
  </div>
</div>

<script>
  (function() {
    // -------------------- SNOW SYSTEM --------------------
    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');
    
    let width = window.innerWidth;
    let height = window.innerHeight;
    let snowflakes = [];
    let snowCount = 135;        // base snow count - rich but smooth
    let wind = 0.18;
    
    // Snowflake settings
    const MIN_RADIUS = 2;
    const MAX_RADIUS = 5.5;
    
    // Resize handler
    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      initSnow();
    }
    
    function initSnow() {
      snowflakes = [];
      for (let i = 0; i < snowCount; i++) {
        snowflakes.push(createSnowflake());
      }
    }
    
    function createSnowflake(x = null, y = null) {
      return {
        x: x !== null ? x : Math.random() * width,
        y: y !== null ? y : Math.random() * height,
        radius: Math.random() * (MAX_RADIUS - MIN_RADIUS) + MIN_RADIUS,
        speedY: Math.random() * 1.4 + 0.5,
        speedX: (Math.random() - 0.5) * 0.7,
        opacity: Math.random() * 0.55 + 0.35
      };
    }
    
    function addSnowflakes(count = 30) {
      for (let i = 0; i < count; i++) {
        snowflakes.push(createSnowflake());
      }
      // keep performance under control (max ~550 flakes)
      if (snowflakes.length > 580) {
        snowflakes = snowflakes.slice(0, 550);
      }
    }
    
    // animate snow
    function animateSnow() {
      if (!ctx) return;
      ctx.clearRect(0, 0, width, height);
      
      for (let i = 0; i < snowflakes.length; i++) {
        const flake = snowflakes[i];
        
        // update position
        flake.y += flake.speedY;
        flake.x += flake.speedX + wind * 0.06;
        
        // boundary reset (top to bottom)
        if (flake.y > height + 15) {
          flake.y = -15;
          flake.x = Math.random() * width;
        }
        if (flake.x > width + 25) flake.x = -25;
        if (flake.x < -25) flake.x = width + 25;
        
        // draw snowflake with soft glow
        ctx.beginPath();
        ctx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 250, ${flake.opacity})`;
        ctx.fill();
        
        // extra inner sparkle for bigger flakes
        if (flake.radius > 3.2) {
          ctx.beginPath();
          ctx.arc(flake.x, flake.y, flake.radius * 0.55, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 245, 0.85)`;
          ctx.fill();
        }
      }
      
      requestAnimationFrame(animateSnow);
    }
    
    // gentle wind based on mouse/touch (playful)
    let targetWind = 0.18;
    function handleMouseMove(e) {
      const normX = (e.clientX / width) * 2 - 1;
      targetWind = normX * 0.65;
    }
    
    function handleTouchMove(e) {
      if (e.touches.length) {
        const touchX = e.touches[0].clientX;
        const normX = (touchX / width) * 2 - 1;
        targetWind = normX * 0.65;
      }
    }
    
    function smoothWindLoop() {
      wind += (targetWind - wind) * 0.05;
      requestAnimationFrame(smoothWindLoop);
    }
    
    // UI Helper: toast message (Myanmar friendly)
    function showToast(message, duration = 1600) {
      const toast = document.createElement('div');
      toast.innerText = message;
      toast.style.position = 'fixed';
      toast.style.bottom = '28%';
      toast.style.left = '50%';
      toast.style.transform = 'translateX(-50%)';
      toast.style.backgroundColor = 'rgba(10, 30, 55, 0.9)';
      toast.style.backdropFilter = 'blur(20px)';
      toast.style.color = 'white';
      toast.style.padding = '12px 24px';
      toast.style.borderRadius = '60px';
      toast.style.fontSize = '0.95rem';
      toast.style.fontWeight = '500';
      toast.style.zIndex = '999';
      toast.style.whiteSpace = 'nowrap';
      toast.style.fontFamily = 'system-ui';
      toast.style.border = '1px solid rgba(255,255,255,0.4)';
      toast.style.boxShadow = '0 8px 20px rgba(0,0,0,0.3)';
      toast.style.pointerEvents = 'none';
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.35s ease';
        setTimeout(() => toast.remove(), 400);
      }, duration);
    }
    
    // -------------------- BUTTONS & INTERACTIONS --------------------
    const moreSnowBtn = document.getElementById('moreSnowBtn');
    const greetingBtn = document.getElementById('greetingBtn');
    
    // More snow button
    moreSnowBtn.addEventListener('click', () => {
      addSnowflakes(45);
      showToast("❄️ နှင်းများ ပိုမိုစိုစွတ်လာပါပြီ ❄️ (+45)", 1300);
    });
    
    // Greeting button with random sweet messages
    const greetings = [
      "မင်္ဂလာပါ! နှင်းတွေနဲ့အတူ ပျော်ရွှင်ပါစေ ❄️",
      "အေးမြတဲ့ နှင်းများကြား နွေးထွေးတဲ့ နှုတ်ဆက်စကား ✨",
      "နှင်းပွင့်တိုင်း ပျော်ရွှင်မှု ပို့ဆောင်ပေးပါစေ 💙",
      "ဒီအပြာရောင်အက်ပ်လေးက သင့်အတွက် အေးချမ်းမှု ယူဆောင်လာပါစေ",
      "❄️ ဆောင်းရာသီရဲ့ လှပမှုကို ခံစားလိုက်ပါ ❄️"
    ];
    let greetingIndex = 0;
    
    greetingBtn.addEventListener('click', () => {
      const msg = greetings[greetingIndex % greetings.length];
      showToast(msg, 2000);
      greetingIndex++;
    });
    
    // Double tap on container: add cluster of snowflakes near tap position
    const container = document.querySelector('.app-container');
    container.addEventListener('dblclick', (e) => {
      const rect = container.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;
      for (let i = 0; i < 12; i++) {
        const offsetX = (Math.random() - 0.5) * 70;
        const offsetY = (Math.random() - 0.5) * 60;
        let newX = clickX + offsetX;
        let newY = clickY + offsetY;
        newX = Math.min(width, Math.max(0, newX));
        newY = Math.min(height, Math.max(0, newY));
        snowflakes.push(createSnowflake(newX, newY));
      }
      showToast("✨ နှင်းစေ့များ ထပ်တိုးသွားပါပြီ ✨", 900);
      if (snowflakes.length > 600) snowflakes = snowflakes.slice(0, 570);
    });
    
    // Also touch friendly for double tap on mobile (using touchend with time tracking)
    let lastTap = 0;
    container.addEventListener('touchend', (e) => {
      const now = Date.now();
      const tapDelay = now - lastTap;
      if (tapDelay < 300 && tapDelay > 40) {
        e.preventDefault();
        const touch = e.changedTouches[0];
        const rect = container.getBoundingClientRect();
        const touchX = touch.clientX - rect.left;
        const touchY = touch.clientY - rect.top;
        for (let i = 0; i < 10; i++) {
          let offX = touchX + (Math.random() - 0.5) * 70;
          let offY = touchY + (Math.random() - 0.5) * 60;
          offX = Math.min(width, Math.max(0, offX));
          offY = Math.min(height, Math.max(0, offY));
          snowflakes.push(createSnowflake(offX, offY));
        }
        showToast("❄️ နှင်းစေ့ထပ်တိုး", 800);
        if (snowflakes.length > 600) snowflakes = snowflakes.slice(0, 570);
      }
      lastTap = now;
    });
    
    // window resize event
    window.addEventListener('resize', () => {
      resizeCanvas();
    });
    
    // initial setup
    resizeCanvas();
    smoothWindLoop();
    animateSnow();
    
    // mouse/touch wind effects
    window.addEventListener('mousemove', handleMouseMove);
    window.addEventListener('touchmove', handleTouchMove);
    
    // ensure graceful performance
    setInterval(() => {
      if (snowflakes.length > 550) {
        snowflakes = snowflakes.slice(0, 530);
      }
    }, 10000);
    
    // Small console greeting for devs (optional)
    console.log('❄️ Snow Blue App ready — နှင်းများကျနေပါပြီ | GitHub ready');
  })();
</script>
</body>
</html>
