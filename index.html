```html
<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Snow Candy - နှင်းနဲ့သကြားလုံးများ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #031a2f;
    }

    /* Main container */
    .app-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 30% 40%, #1e5a88, #0a2a48, #041c30);
      overflow: hidden;
    }

    /* Canvases */
    #snow-canvas, #candy-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #snow-canvas { z-index: 2; }
    #candy-canvas { z-index: 3; }

    /* Ambient glow */
    .ambient-glow {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(255,220,150,0.1) 0%, rgba(80,120,180,0.05) 100%);
      pointer-events: none;
      z-index: 1;
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.9; }
    }

    /* Invisible buttons */
    .hidden-controls {
      position: absolute;
      bottom: 30px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 50px;
      z-index: 30;
      opacity: 0;
      pointer-events: none;
    }
    .invisible-btn {
      width: 70px;
      height: 70px;
      border-radius: 70px;
      background: transparent;
      border: none;
      cursor: pointer;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }
    .touch-area {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      height: 100px;
      z-index: 25;
      opacity: 0;
      pointer-events: auto;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="ambient-glow"></div>
  <canvas id="snow-canvas"></canvas>
  <canvas id="candy-canvas"></canvas>
  
  <div class="hidden-controls">
    <button class="invisible-btn" id="moreSnowBtn" aria-label="Add snow"></button>
    <button class="invisible-btn" id="candyBurstBtn" aria-label="Candy burst"></button>
  </div>
  <div class="touch-area" id="doubleTapArea"></div>
</div>

<script>
  (function() {
    // --- DOM elements ---
    const snowCanvas = document.getElementById('snow-canvas');
    const candyCanvas = document.getElementById('candy-canvas');
    let snowCtx = snowCanvas.getContext('2d');
    let candyCtx = candyCanvas.getContext('2d');
    
    let width = window.innerWidth;
    let height = window.innerHeight;
    
    // --- Snow system (reduced) ---
    let snowflakes = [];
    const SNOW_COUNT = 55;   // less snow
    
    // --- Candy system (many colorful candies) ---
    let candies = [];
    let candyCount = 32;      // enough to see
    
    let wind = 0.12;
    let targetWind = 0.12;
    
    // Helper: resize canvases
    function resizeAll() {
      width = window.innerWidth;
      height = window.innerHeight;
      snowCanvas.width = width;
      snowCanvas.height = height;
      candyCanvas.width = width;
      candyCanvas.height = height;
      
      // Reinitialize snow and candies to fit new size
      initSnow();
      initCandies();
    }
    
    // --- Snowflake ---
    function createSnowflake(x = null, y = null) {
      return {
        x: x !== null ? x : Math.random() * width,
        y: y !== null ? y : Math.random() * height,
        radius: Math.random() * 4 + 1.5,   // 1.5 - 5.5
        speedY: Math.random() * 1.0 + 0.4,
        speedX: (Math.random() - 0.5) * 0.5,
        opacity: Math.random() * 0.5 + 0.3
      };
    }
    
    function initSnow() {
      snowflakes = [];
      for (let i = 0; i < SNOW_COUNT; i++) {
        snowflakes.push(createSnowflake());
      }
    }
    
    function addSnowflakes(amount = 8) {
      for (let i = 0; i < amount; i++) {
        snowflakes.push(createSnowflake());
      }
      if (snowflakes.length > 120) snowflakes = snowflakes.slice(0, 100);
    }
    
    // --- Candies (bright, various shapes, clearly visible) ---
    const candyColors = [
      '#FF5252', '#FF8C42', '#FFD93D', '#6BCB77', '#4D96FF', 
      '#9C27B0', '#FF6B9D', '#3BC9DB', '#FAA75E', '#E86A6A',
      '#F5B042', '#42C5A5', '#D65DB1', '#FF9671', '#845EC2'
    ];
    
    class Candy {
      constructor(x = null, y = null) {
        this.x = x !== null ? x : Math.random() * width;
        this.y = y !== null ? y : Math.random() * height;
        this.type = Math.floor(Math.random() * 4);   // 0:round, 1:heart, 2:star, 3:square
        this.size = Math.random() * 14 + 10;          // 10-24px
        this.color = candyColors[Math.floor(Math.random() * candyColors.length)];
        this.speedY = Math.random() * 0.5 + 0.2;      // gentle float
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.02;
        this.opacity = Math.random() * 0.4 + 0.6;     // clearly visible
        this.glow = Math.random() * 0.5 + 0.3;
      }
      
      update() {
        this.y += this.speedY;
        this.x += this.speedX + wind * 0.04;
        this.rotation += this.rotSpeed;
        
        // wrap around edges
        if (this.y > height + 80) {
          this.y = -60;
          this.x = Math.random() * width;
        }
        if (this.x > width + 80) this.x = -80;
        if (this.x < -80) this.x = width + 80;
      }
      
      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.globalAlpha = this.opacity;
        ctx.shadowBlur = 8;
        ctx.shadowColor = `rgba(255, 200, 100, ${this.glow * 0.6})`;
        
        const half = this.size / 2;
        
        switch(this.type) {
          case 0: // round candy with highlight
            ctx.beginPath();
            ctx.arc(0, 0, half, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            // shiny highlight
            ctx.beginPath();
            ctx.arc(-half * 0.3, -half * 0.3, half * 0.35, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.fill();
            // stripe
            ctx.beginPath();
            ctx.ellipse(0, 0, half * 0.8, half * 0.2, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fill();
            break;
            
          case 1: // heart shape
            ctx.beginPath();
            const s = half;
            ctx.moveTo(0, s * 0.5);
            ctx.bezierCurveTo(-s, -s * 0.3, -s * 0.6, -s * 0.9, 0, -s * 0.2);
            ctx.bezierCurveTo(s * 0.6, -s * 0.9, s, -s * 0.3, 0, s * 0.5);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-s * 0.25, -s * 0.3, s * 0.25, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 240, 0.6)';
            ctx.fill();
            break;
            
          case 2: // star candy
            const spikes = 5;
            const outer = half;
            const inner = half * 0.45;
            let rot = Math.PI / 2 * 3;
            const step = Math.PI / spikes;
            ctx.beginPath();
            for (let i = 0; i < spikes; i++) {
              const x1 = Math.cos(rot) * outer;
              const y1 = Math.sin(rot) * outer;
              ctx.lineTo(x1, y1);
              rot += step;
              const x2 = Math.cos(rot) * inner;
              const y2 = Math.sin(rot) * inner;
              ctx.lineTo(x2, y2);
              rot += step;
            }
            ctx.closePath();
            ctx.fillStyle = this.color;
            ctx.fill();
            // star core
            ctx.beginPath();
            ctx.arc(0, 0, half * 0.35, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 250, 180, 0.8)';
            ctx.fill();
            break;
            
          default: // square with rounded corners
            const rad = half * 0.25;
            ctx.beginPath();
            ctx.moveTo(-half + rad, -half);
            ctx.lineTo(half - rad, -half);
            ctx.quadraticCurveTo(half, -half, half, -half + rad);
            ctx.lineTo(half, half - rad);
            ctx.quadraticCurveTo(half, half, half - rad, half);
            ctx.lineTo(-half + rad, half);
            ctx.quadraticCurveTo(-half, half, -half, half - rad);
            ctx.lineTo(-half, -half + rad);
            ctx.quadraticCurveTo(-half, -half, -half + rad, -half);
            ctx.fillStyle = this.color;
            ctx.fill();
            // sprinkle
            ctx.beginPath();
            ctx.arc(-half * 0.4, -half * 0.4, half * 0.25, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 240, 200, 0.8)';
            ctx.fill();
            break;
        }
        
        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }
    
    function initCandies() {
      candies = [];
      for (let i = 0; i < candyCount; i++) {
        candies.push(new Candy());
      }
    }
    
    function addCandyBurst(x, y) {
      for (let i = 0; i < 12; i++) {
        let offX = x + (Math.random() - 0.5) * 100;
        let offY = y + (Math.random() - 0.5) * 100;
        offX = Math.min(width, Math.max(0, offX));
        offY = Math.min(height, Math.max(0, offY));
        const newCandy = new Candy(offX, offY);
        newCandy.speedY = Math.random() * 1.2 + 0.5;
        newCandy.speedX = (Math.random() - 0.5) * 1.0;
        candies.push(newCandy);
      }
      if (candies.length > 140) candies = candies.slice(0, 120);
    }
    
    function addExtraCandies(amount = 6) {
      for (let i = 0; i < amount; i++) {
        candies.push(new Candy());
      }
      if (candies.length > 140) candies = candies.slice(0, 120);
    }
    
    // --- Animation loops ---
    function drawSnow() {
      if (!snowCtx) return;
      snowCtx.clearRect(0, 0, width, height);
      
      for (let flake of snowflakes) {
        flake.y += flake.speedY;
        flake.x += flake.speedX + wind * 0.05;
        
        if (flake.y > height + 20) {
          flake.y = -20;
          flake.x = Math.random() * width;
        }
        if (flake.x > width + 30) flake.x = -30;
        if (flake.x < -30) flake.x = width + 30;
        
        snowCtx.beginPath();
        snowCtx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
        snowCtx.fillStyle = `rgba(255, 255, 250, ${flake.opacity})`;
        snowCtx.fill();
        
        if (flake.radius > 3) {
          snowCtx.beginPath();
          snowCtx.arc(flake.x, flake.y, flake.radius * 0.6, 0, Math.PI * 2);
          snowCtx.fillStyle = `rgba(255, 255, 245, 0.7)`;
          snowCtx.fill();
        }
      }
      requestAnimationFrame(drawSnow);
    }
    
    function drawCandies() {
      if (!candyCtx) return;
      candyCtx.clearRect(0, 0, width, height);
      
      for (let candy of candies) {
        candy.update();
        candy.draw(candyCtx);
      }
      requestAnimationFrame(drawCandies);
    }
    
    // --- Wind interaction (mouse / touch) ---
    function handleMove(clientX) {
      const normX = (clientX / width) * 2 - 1;
      targetWind = normX * 0.55;
    }
    
    function onMouseMove(e) {
      handleMove(e.clientX);
    }
    
    function onTouchMove(e) {
      if (e.touches.length) {
        handleMove(e.touches[0].clientX);
      }
    }
    
    function smoothWind() {
      wind += (targetWind - wind) * 0.06;
      requestAnimationFrame(smoothWind);
    }
    
    // --- Haptic feedback (silent) ---
    function subtleFeedback() {
      if (window.navigator && window.navigator.vibrate) {
        window.navigator.vibrate(20);
      }
    }
    
    // --- UI Buttons (invisible, functional) ---
    const moreSnowBtn = document.getElementById('moreSnowBtn');
    const candyBurstBtn = document.getElementById('candyBurstBtn');
    const doubleTapArea = document.getElementById('doubleTapArea');
    const container = document.querySelector('.app-container');
    
    moreSnowBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      addSnowflakes(8);
      subtleFeedback();
    });
    
    candyBurstBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      addCandyBurst(width / 2, height / 2);
      subtleFeedback();
    });
    
    // Double tap anywhere → candy burst + a few snowflakes
    function handleDoubleTap(x, y) {
      addCandyBurst(x, y);
      addSnowflakes(4);
      subtleFeedback();
    }
    
    container.addEventListener('dblclick', (e) => {
      const rect = container.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      handleDoubleTap(x, y);
    });
    
    let lastTap = 0;
    container.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTap < 300 && now - lastTap > 40) {
        e.preventDefault();
        const touch = e.changedTouches[0];
        const rect = container.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        handleDoubleTap(x, y);
      }
      lastTap = now;
    });
    
    // Device orientation for wind
    if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', (e) => {
        if (e.gamma !== null) {
          const gamma = Math.min(0.7, Math.max(-0.7, e.gamma / 50));
          targetWind = gamma * 0.8;
        }
      });
    }
    
    // --- Initialize and resize handling ---
    window.addEventListener('resize', () => {
      resizeAll();
      // re-fetch contexts after resize (just in case)
      snowCtx = snowCanvas.getContext('2d');
      candyCtx = candyCanvas.getContext('2d');
    });
    
    // Also re-fetch contexts initially
    snowCtx = snowCanvas.getContext('2d');
    candyCtx = candyCanvas.getContext('2d');
    
    resizeAll();
    smoothWind();
    drawSnow();
    drawCandies();
    
    // Add event listeners for wind
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('touchmove', onTouchMove);
    
    // Periodically add new candies to keep scene lively (gentle)
    setInterval(() => {
      if (candies.length < 45) {
        addExtraCandies(3);
      }
    }, 9000);
    
    // Performance guard
    setInterval(() => {
      if (snowflakes.length > 100) snowflakes = snowflakes.slice(0, 90);
      if (candies.length > 130) candies = candies.slice(0, 110);
    }, 20000);
    
    console.log('🍭❄️ Snow Candy: Candies and snow are dancing!');
  })();
</script>
</body>
</html>
