<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blue Snowfall App</title>
    <style>
        /* တစ်ခွက်လုံးကို မိုးပြာရောင် နောက်ခံထားခြင်း */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* ညဘက် ကောင်းကင်ပြာလို မိုးပြာရောင် ပုံစံမျိုး */
            background: linear-gradient(to bottom, #4a90e2, #144272); 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* နှင်းပွင့်လေးများအတွက် ပုံစံ */
        .snowflake {
            position: absolute;
            top: -10px; 
            background-color: white;
            border-radius: 50%; 
            pointer-events: none; 
            animation: fall linear infinite; 
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        }

        /* နှင်းကျမည့် Animation */
        @keyframes fall {
            0% {
                top: -10px;
                transform: translateX(0);
                opacity: 1;
            }
            100% {
                top: 100vh; 
                transform: translateX(50px); 
                opacity: 0.2; 
            }
        }
    </style>
</head>
<body>

    <script>
        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            
            const size = Math.random() * 5 + 2 + 'px';
            snowflake.style.width = size;
            snowflake.style.height = size;

            snowflake.style.left = Math.random() * 100 + 'vw';
            
            const duration = Math.random() * 3 + 2;
            snowflake.style.animationDuration = duration + 's'; 
            
            snowflake.style.opacity = Math.random();

            document.body.appendChild(snowflake);

            setTimeout(() => {
                snowflake.remove();
            }, (duration + 1) * 1000);
        }

        setInterval(createSnowflake, 50); 
    </script>
</body>
</html>
