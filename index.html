<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snowfall App - Winter Wonderland</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #87CEEB 0%, #98D8E8 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1.5s ease-in;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        button {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            color: white;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        #snowCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            p {
                font-size: 1rem;
            }
            
            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>❄️ Winter Wonderland ❄️</h1>
        <p>Welcome to your peaceful snowy escape</p>
        <button id="toggleSnowBtn">Pause Snow</button>
    </div>
    
    <canvas id="snowCanvas"></canvas>

    <script>
        class Snowfall {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.snowflakes = [];
                this.isSnowing = true;
                this.animationId = null;
                
                this.init();
                this.setupEventListeners();
                this.animate();
                this.handleResize();
            }
            
            init() {
                this.numberOfSnowflakes = 150;
                this.snowflakes = [];
                
                for (let i = 0; i < this.numberOfSnowflakes; i++) {
                    this.snowflakes.push(this.createSnowflake());
                }
            }
            
            createSnowflake() {
                return {
                    x: Math.random() * this.canvas.width,
                    y: Math.random() * this.canvas.height,
                    radius: Math.random() * 4 + 1,
                    speedY: Math.random() * 1.5 + 0.5,
                    speedX: Math.random() * 0.5 - 0.25,
                    opacity: Math.random() * 0.5 + 0.3,
                    swing: Math.random() * Math.PI * 2,
                    swingSpeed: Math.random() * 0.02 + 0.005
                };
            }
            
            drawSnowflake(snowflake) {
                this.ctx.beginPath();
                this.ctx.arc(snowflake.x, snowflake.y, snowflake.radius, 0, Math.PI * 2);
                this.ctx.fillStyle = `rgba(255, 255, 255, ${snowflake.opacity})`;
                this.ctx.fill();
                
                if (snowflake.radius > 2.5) {
                    this.ctx.beginPath();
                    this.ctx.arc(snowflake.x, snowflake.y, snowflake.radius * 0.8, 0, Math.PI * 2);
                    this.ctx.fillStyle = `rgba(255, 255, 255, ${snowflake.opacity * 0.5})`;
                    this.ctx.fill();
                }
            }
            
            updateSnowflake(snowflake) {
                snowflake.swing += snowflake.swingSpeed;
                snowflake.x += snowflake.speedX + Math.sin(snowflake.swing) * 0.2;
                snowflake.y += snowflake.speedY;
                
                if (snowflake.y > this.canvas.height) {
                    snowflake.y = -snowflake.radius;
                    snowflake.x = Math.random() * this.canvas.width;
                    snowflake.speedY = Math.random() * 1.5 + 0.5;
                }
                
                if (snowflake.x > this.canvas.width + snowflake.radius) {
                    snowflake.x = -snowflake.radius;
                } else if (snowflake.x < -snowflake.radius) {
                    snowflake.x = this.canvas.width + snowflake.radius;
                }
            }
            
            draw() {
                if (!this.isSnowing) return;
                
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                for (let snowflake of this.snowflakes) {
                    this.updateSnowflake(snowflake);
                    this.drawSnowflake(snowflake);
                }
            }
            
            animate() {
                this.draw();
                this.animationId = requestAnimationFrame(() => this.animate());
            }
            
            toggleSnow() {
                this.isSnowing = !this.isSnowing;
                if (this.isSnowing) {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                } else {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                }
                return this.isSnowing;
            }
            
            handleResize() {
                const resizeCanvas = () => {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                    this.init();
                };
                
                window.addEventListener('resize', () => {
                    resizeCanvas();
                });
                
                resizeCanvas();
            }
            
            setupEventListeners() {
                const toggleBtn = document.getElementById('toggleSnowBtn');
                if (toggleBtn) {
                    toggleBtn.addEventListener('click', () => {
                        const isSnowing = this.toggleSnow();
                        toggleBtn.textContent = isSnowing ? 'Pause Snow' : 'Start Snow';
                    });
                }
            }
            
            cleanup() {
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('snowCanvas');
            const snowfall = new Snowfall(canvas);
            console.log('❄️ Welcome to the Snowfall App! ❄️');
        });
    </script>
</body>
</html>
