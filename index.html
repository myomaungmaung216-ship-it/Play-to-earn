<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blue Snowfall App</title>
    <style>
        /* တစ်ခွက်လုံးကို အပြာရောင် ရင့်ရင့် နောက်ခံထားခြင်း */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #050a14, #10203a);
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* App ရဲ့ အဓိက စာသား - Glow ပုံစံ */
        h1 {
            z-index: 10; 
            font-size: 2.5rem;
            text-align: center;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 
                         0 0 25px rgba(255, 255, 255, 0.5);
            pointer-events: none; 
        }

        /* နှင်းပွင့်လေးများအတွက် ပုံစံ */
        .snowflake {
            position: absolute;
            top: -10px; 
            background-color: white;
            border-radius: 50%; 
            pointer-events: none; 
            animation: fall linear infinite; 
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        }

        /* နှင်းကျမည့် Animation - အပေါ်က ကုဒ်မှာ ဒီပိတ်ကွင်းကျန်ခဲ့လို့ မရတာပါ */
        @keyframes fall {
            0% {
                top: -10px;
                transform: translateX(0);
                opacity: 1;
            }
            100% {
                top: 100vh; 
                transform: translateX(50px); 
                opacity: 0.2; 
            }
        }
    </style>
</head>
<body>

    <h1>Welcome to My App</h1>

    <script>
        // နှင်းပွင့်လေးတွေ အလိုအလျောက် ထွက်လာစေရန် JavaScript
        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            
            // နှင်းပွင့်ရဲ့ အရွယ်အစားကို ကျပန်း (Random) ပေးခြင်း
            const size = Math.random() * 5 + 2 + 'px';
            snowflake.style.width = size;
            snowflake.style.height = size;

            // နှင်းပွင့်စကျမည့် နေရာကို ဘယ်-ညာ ကျပန်း (Random) ပေးခြင်း
            snowflake.style.left = Math.random() * 100 + 'vw';
            
            // နှင်းကျမည့် ကြာချိန် (အမြန်နှုန်း) ကို ကျပန်း (Random) ပေးခြင်း
            const duration = Math.random() * 3 + 2;
            snowflake.style.animationDuration = duration + 's'; 
            
            // နှင်းပွင့်ရဲ့ အစလင်းအားကို ကျပန်း (Random) ပေးခြင်း
            snowflake.style.opacity = Math.random();

            document.body.appendChild(snowflake);

            // နှင်းပွင့်လေးတွေ အောက်ရောက်ရင် ဖျက်ထုတ်ပစ်ခြင်း
            setTimeout(() => {
                snowflake.remove();
            }, (duration + 1) * 1000);
        }

        // ၅၀ မီလီစက္ကန့်တိုင်း နှင်းတစ်ပွင့် အသစ်ထုတ်ပေးရန်
        setInterval(createSnowflake, 50); 
    </script>
</body>
</html>
